services:
  postgres:
    image: postgres:16-alpine
    container_name: aishop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aishop_db}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/aishop_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-aishop_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  db-init:
    image: postgres:16-alpine
    container_name: aishop-db-init
    profiles: ["init"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-123456}
    volumes:
      - ./sql/aishop_postgres.sql:/sql/aishop_postgres.sql:ro
      - ./sql/products_from_csv_merged_dedup_data5_format.sql:/sql/products_from_csv_merged_dedup_data5_format.sql:ro
    command:
      - /bin/sh
      - -c
      - >
        set -e;
        for f in
        /sql/aishop_postgres.sql
        /sql/products_from_csv_merged_dedup_data5_format.sql
        ; do
          echo "[db-init] running $${f}";
          psql -h postgres -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-aishop_db} -v ON_ERROR_STOP=1 -f "$${f}";
        done
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: aishop-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: aishop-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${ES_PORT:-9201}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: aishop-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - milvus_etcd:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: aishop-milvus-minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data
    volumes:
      - milvus_minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.0
    container_name: aishop-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HTTP_PORT:-9091}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - milvus-minio

  attu:
    image: zilliz/attu:latest
    container_name: aishop-attu
    ports:
      - "${ATTU_PORT:-8000}:3000"
    depends_on:
      milvus:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  milvus_data:
  milvus_etcd:
  milvus_minio:
  es_data:
